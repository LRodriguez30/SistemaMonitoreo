<div class="flex h-screen bg-(--clr-bg-50) text-(--clr-text-900)">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-(--clr-bg-0) border-r flex flex-col">

        <!-- HEADER -->
        <div class="p-4 border-b flex items-center gap-3">
            <div
                class="w-8 h-8 bg-(--clr-primary-600) text-(--clr-text-primary-0) rounded-lg flex items-center justify-center">
                <iconify-icon icon="lucide:hexagon"></iconify-icon>
            </div>
            <span class="font-bold text-lg">Monitoreo</span>
        </div>

        <!-- NAV -->
        <nav class="flex-1 p-3 space-y-1 text-sm">

            <a class="flex items-center gap-3 px-3 py-2 rounded-md bg-(--clr-primary-600) text-(--clr-text-primary-0)">
                <iconify-icon icon="lucide:layout-dashboard"></iconify-icon>
                Dashboard
            </a>

            <a routerLink="/ventas" routerLinkActive="nav-active-link"
                class="cursor-pointer flex items-center gap-3 px-3 py-2 rounded-md text-(--clr-text-500) hover:bg-(--clr-bg-100)">
                <iconify-icon icon="lucide:shopping-cart"></iconify-icon>
                Ventas
            </a>

            <a routerLink="/inventario" routerLinkActive="nav-active-link"
                class="flex items-center gap-3 px-3 py-2 rounded-md text-(--clr-text-500) hover:bg-(--clr-bg-100)">
                <iconify-icon icon="lucide:package"></iconify-icon>
                Inventario
            </a>

            <a routerLink="/logs" routerLinkActive="nav-active-link"
                class="flex items-center gap-3 px-3 py-2 rounded-md text-(--clr-text-500) hover:bg-(--clr-bg-100)">
                <iconify-icon icon="lucide:activity"></iconify-icon>
                Logs de Actividad
            </a>

            <a routerLink="/auditorias" routerLinkActive="nav-active-link"
                class="flex items-center gap-3 px-3 py-2 rounded-md text-(--clr-text-500) hover:bg-(--clr-bg-100)">
                <iconify-icon icon="lucide:shield"></iconify-icon>
                Auditorías
            </a>

            <a routerLink="/sesiones" routerLinkActive="nav-active-link"
                class="flex items-center gap-3 px-3 py-2 rounded-md text-(--clr-text-500) hover:bg-(--clr-bg-100)">
                <iconify-icon icon="lucide:users"></iconify-icon>
                Sesiones
            </a>

            <a routerLink="/metricas" routerLinkActive="nav-active-link"
                class="flex items-center gap-3 px-3 py-2 rounded-md text-(--clr-text-500) hover:bg-(--clr-bg-100)">
                <iconify-icon icon="lucide:bar-chart-2"></iconify-icon>
                Métricas
            </a>

            <a routerLink="/sistema" routerLinkActive="nav-active-link"
                class="flex items-center gap-3 px-3 py-2 rounded-md text-(--clr-text-500) hover:bg-(--clr-bg-100)">
                <iconify-icon icon="lucide:server"></iconify-icon>
                Sistema
            </a>

            <a routerLink="/cajas" routerLinkActive="nav-active-link"
                class="flex items-center gap-3 px-3 py-2 rounded-md text-(--clr-text-500) hover:bg-(--clr-bg-100)">
                <iconify-icon icon="lucide:credit-card"></iconify-icon>
                Cajas
            </a>

        </nav>
    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col">

        <!-- TOPBAR -->
        <header class="h-16 bg-(--clr-bg-0) border-b flex items-center justify-between px-6">
            <button (click)="toggleTheme()" class="w-10 h-10
               cursor-pointer
               flex items-center justify-center
               rounded-xl
               border border-(--clr-border-300)
               bg-(--clr-bg-200)
               text-(--clr-text-900)
               transition-all duration-200

               hover:bg-(--clr-bg-300)
               hover:text-(--clr-primary-500)
               hover:border-(--clr-border-300)
               hover:shadow-md

               active:scale-95">

                <iconify-icon [icon]="isDarkMode ? 'lucide:sun' : 'lucide:moon'" class="text-lg">
                </iconify-icon>

            </button>

            <!-- <div class="flex items-center gap-2 w-96 px-3 py-2 border rounded-md bg-gray-50 text-gray-500 text-sm">
                <iconify-icon icon="lucide:search"></iconify-icon>
                Buscar eventos, IDs, usuarios...
            </div> -->

            <!-- <div class="flex items-center gap-4">

                <button class="relative">
                    <iconify-icon icon="lucide:bell"></iconify-icon>
                    <span class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>

                <div class="flex items-center gap-3 border-l pl-4">
                    <img src="https://storage.googleapis.com/banani-avatars/avatar/male/18-25/European/2"
                        class="w-8 h-8 rounded-full" />

                    <div>
                        <div class="text-sm font-medium">Admin User</div>
                        <div class="text-xs text-gray-500">SysAdmin</div>
                    </div>
                </div>

            </div> -->
        </header>

        <!-- CONTENT -->
        <main class="p-6 flex flex-col gap-6">
            <router-outlet></router-outlet>
        </main>
    </div>

</div>

<style>
    .nav-active-link {

        background:
            linear-gradient(to right,
                rgba(59, 130, 246, 0.15),
                rgba(96, 165, 250, 0.1));

        color: var(--clr-text-900) !important;

        border: 1px solid rgba(59, 130, 246, .12);

        backdrop-filter: blur(8px);
    }

    .nav-active-link mat-icon,
    .nav-active-link i {

        color: #2563eb !important;
    }

    .nav-active-link {

        position: relative;

        overflow: hidden;
    }

    .nav-active-link::before {

        content: '';

        position: absolute;

        left: 0;
        top: 8px;
        bottom: 8px;

        width: 3px;

        border-radius: 999px;

        background: #3b82f6;
    }
</style>
